name: CD

on:
  push:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # Déploiement Staging — automatique sur chaque merge dans main        #
  # ------------------------------------------------------------------ #
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging   # Environment GitHub → secrets isolés par env

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Scaleway instance (staging)
        # Connexion SSH à l'instance Scaleway et mise à jour du conteneur
        # Les secrets sont configurés dans GitHub → Settings → Environments → staging
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_key \
              ubuntu@${{ secrets.INSTANCE_IP }} \
              "cd /opt/app && \
               docker pull ghcr.io/${{ github.repository_owner }}/formation-devops:${{ github.sha }} && \
               APP_VERSION=${{ github.sha }} docker compose up -d --no-build"
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # Écrire la clé SSH dans un fichier temporaire
      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Smoke test staging
        run: |
          sleep 5
          curl --fail https://staging.example.com/api/health

  # ------------------------------------------------------------------ #
  # Déploiement Production — avec approbation manuelle                   #
  # ------------------------------------------------------------------ #
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # Approbation requise dans GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Scaleway instance (production)
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_key \
              ubuntu@${{ secrets.INSTANCE_IP }} \
              "cd /opt/app && \
               docker pull ghcr.io/${{ github.repository_owner }}/formation-devops:${{ github.sha }} && \
               APP_VERSION=${{ github.sha }} docker compose up -d --no-build"

      - name: Verify production health
        run: |
          sleep 5
          curl --fail https://prod.example.com/api/health
